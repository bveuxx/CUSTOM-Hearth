name: 💡 Feature request
description: Suggest an idea or improvement for Hearth
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the idea! Hearth is opinionated, so describing the
        **problem you're trying to solve** — not just the feature — helps a lot;
        the *why* often points at a better solution than the *what*.
  - type: textarea
    id: problem
    attributes:
      label: What problem would this solve?
      description: What are you trying to do that Hearth makes hard or impossible today?
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Your idea
      description: How do you imagine it working? Rough sketches or examples welcome.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
    validations:
      required: false
