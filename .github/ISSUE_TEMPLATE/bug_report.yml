name: 🐛 Bug report
description: Something in Hearth misbehaves
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug! A clear, self-contained
        report is the single most useful thing you can send. Please search
        [existing issues](https://github.com/ondreu/Hearth/issues?q=is%3Aissue)
        first to avoid duplicates.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: What did you do, what did you expect, and what happened instead?
      placeholder: |
        1. Opened the dashboard
        2. Added a Tasks card
        3. Expected … but instead …
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The smallest sequence that reliably triggers it.
    validations:
      required: false
  - type: input
    id: hearth-version
    attributes:
      label: Hearth version
      placeholder: "1.8.0"
    validations:
      required: true
  - type: input
    id: obsidian-version
    attributes:
      label: Obsidian version
      placeholder: "1.8.7"
    validations:
      required: true
  - type: dropdown
    id: platform
    attributes:
      label: Platform
      options:
        - Desktop (Windows)
        - Desktop (macOS)
        - Desktop (Linux)
        - Mobile (iOS)
        - Mobile (Android)
    validations:
      required: true
  - type: textarea
    id: extras
    attributes:
      label: Screenshots, recordings or console errors
      description: |
        Anything visual helps. Console errors: open the developer console
        (Ctrl/Cmd+Shift+I) and paste any red errors here.
    validations:
      required: false
