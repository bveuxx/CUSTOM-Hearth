name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref (e.g. rapid pushes to a PR).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Typecheck & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"
          cache: npm

      - name: Install dependencies
        run: npm ci

      # The Obsidian community store reads the version straight from
      # manifest.json at HEAD of the default branch. A pre-release version here
      # is served to every stable user, so betas must live in manifest-beta.json
      # only. Fail the build if the store-facing manifest is anything but plain
      # x.y.z (this blocks 1.9.0-beta.1 and 1.8.1.4-beta style versions alike).
      - name: Guard store manifest is plain x.y.z
        run: |
          store="$(node -p "require('./manifest.json').version")"
          if ! printf '%s' "$store" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error file=manifest.json::version '$store' is not plain x.y.z."
            echo "Betas belong in manifest-beta.json — see RELEASING.md."
            exit 1
          fi
          echo "Store manifest version OK: $store"

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Verify build output
        run: test -f main.js && test -f manifest.json && test -f styles.css
