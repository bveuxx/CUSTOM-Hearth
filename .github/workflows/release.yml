name: Release Obsidian plugin

on:
  push:
    tags:
      # Stable version tags, e.g. 1.8.1 — must match manifest.json.
      - "[0-9]+.[0-9]+.[0-9]+"
      # Pre-release tags, e.g. 1.9.0-beta.1 / -alpha.2 / -rc.1 — must match
      # manifest-beta.json. The trailing "-*" requires a hyphen immediately
      # after x.y.z, so four-segment tags (1.8.1.4-beta) still do not match.
      - "[0-9]+.[0-9]+.[0-9]+-*"
  # Allow cutting a release manually from the Actions tab / API.
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.8.1). Defaults to the manifest matching the tag."
        required: false
      allow_no_beta:
        description: "Emergency hotfix ONLY: allow a stable release with no matching x.y.z-beta.* build. Leave false normally."
        type: boolean
        default: false
        required: false

permissions:
  contents: write
  # Required for build-provenance attestations on the release assets.
  id-token: write
  attestations: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history + all tags so the beta-parity guard below can diff the
          # stable commit against its x.y.z-beta.* tag.
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install & build
        run: |
          npm ci
          npm run build

      - name: Verify build output
        run: test -f main.js && test -f manifest.json && test -f styles.css

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json
            manifest-beta.json

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            tag="${{ github.event.inputs.version }}"
            [ -z "$tag" ] && tag="$(node -p "require('./manifest.json').version")"
          else
            tag="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      # A pre-release tag carries a "-" after the x.y.z core. Betas are
      # validated against manifest-beta.json (which BRAT reads); stable tags
      # against manifest.json (which the community store reads). Keeping the two
      # channels in two files is what stops a beta from ever becoming the
      # store's "latest version" — the store only ever sees manifest.json.
      - name: Verify tag matches the correct manifest
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          case "$tag" in
            *-*)
              file="manifest-beta.json"
              if [ ! -f "$file" ]; then
                echo "::error::Pre-release '$tag' requires $file. Bump it to '$tag' and commit before tagging."
                exit 1
              fi
              ;;
            *)
              file="manifest.json"
              ;;
          esac
          manifest="$(node -p "require('./$file').version")"
          if [ "$tag" != "$manifest" ]; then
            echo "::error::Release tag '$tag' does not match $file version '$manifest'."
            echo "A mismatch blocks the plugin in the Obsidian store with"
            echo "\"No release matches your manifest version\". Bump $file to"
            echo "'$tag' before tagging, or re-tag to match."
            exit 1
          fi
          echo "Tag matches $file version: $manifest"

      # A stable x.y.z must be the PROMOTION of a beta-tested build, not a fresh
      # build of whatever is on main now. This is the guard that catches a beta's
      # un-tested code — a new feature, a refactor — from shipping straight to
      # every stable user. It enforces that the tagged commit's build inputs
      # (src/, styles.css, esbuild.config.mjs) are byte-for-byte identical to the
      # newest x.y.z-beta.* release that preceded it. A version-only promotion
      # bump (manifest / versions.json / package.json / CHANGELOG) leaves those
      # untouched, so a correct promotion passes; tagging a diverged main fails.
      - name: Verify stable is the promotion of its beta-tested build
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          case "$tag" in
            *-*) echo "Pre-release $tag — beta-parity check does not apply."; exit 0 ;;
          esac
          betaTag="$(git tag -l "${tag}-*" | sort -V | tail -n1)"
          if [ -z "$betaTag" ]; then
            echo "::error::No ${tag}-beta.* tag exists. A stable release must promote a beta-tested build."
            echo "Cut ${tag}-beta.N and let it soak first (see RELEASING.md), or — for a genuine"
            echo "emergency hotfix ONLY — re-run from the Actions tab with allow_no_beta = true."
            if [ "${{ github.event.inputs.allow_no_beta }}" = "true" ]; then
              echo "::warning::allow_no_beta set — shipping stable $tag with no beta. Emergency path."
              exit 0
            fi
            exit 1
          fi
          if git diff --quiet "$betaTag" HEAD -- src styles.css esbuild.config.mjs; then
            echo "Stable $tag matches beta-tested $betaTag: src/, styles.css and esbuild.config.mjs are identical."
          else
            echo "::error::Stable $tag diverges from its beta $betaTag in build inputs (src/, styles.css or esbuild.config.mjs)."
            echo "Stable must be the exact code that was beta-tested. Either tag the beta-tested"
            echo "commit as $tag (a version-only bump is fine), or cut a fresh ${tag}-beta.N, let it"
            echo "soak, and promote that. See RELEASING.md -> 'Promoting a beta to stable'."
            echo "--- differing build inputs ($betaTag..HEAD) ---"
            git --no-pager diff --stat "$betaTag" HEAD -- src styles.css esbuild.config.mjs || true
            exit 1
          fi

      # Belt-and-braces: even if a bad manifest slipped past CI, never let a
      # pre-release version sit in the store-facing manifest.json.
      - name: Guard store manifest is plain x.y.z
        run: |
          store="$(node -p "require('./manifest.json').version")"
          if ! printf '%s' "$store" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::manifest.json version '$store' is not plain x.y.z."
            echo "Betas belong in manifest-beta.json — the community store reads"
            echo "manifest.json and would serve this to every stable user."
            exit 1
          fi

      - name: Publish release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          # Pre-releases must not become the repo's "latest" release — mark them
          # so stable stays latest for BRAT and GitHub's UI. (Obsidian's store
          # ignores this flag; the manifest split is what protects the store.)
          # Stable tags are pinned --latest explicitly.
          #
          # BRAT reads an asset literally named manifest.json from the release.
          # For betas that asset must carry the beta version, so overwrite the
          # runner's working-copy manifest.json with the beta manifest before
          # uploading. This is ephemeral CI state — the committed manifest.json
          # on the branch is never changed and still points at stable.
          case "$tag" in
            *-*)
              flags="--prerelease --latest=false"
              cp manifest-beta.json manifest.json
              ;;
            *)
              flags="--latest"
              ;;
          esac
          # Assets must be attached as individual files (not zipped) so BRAT can
          # fetch manifest.json, main.js and styles.css directly. Idempotent so
          # re-runs just refresh the assets.
          if gh release view "$tag" >/dev/null 2>&1; then
            # Re-run: refresh assets and re-assert the prerelease/latest state so
            # a manually-touched release can't linger in the wrong flavour.
            gh release edit "$tag" $flags
            gh release upload "$tag" main.js manifest.json styles.css --clobber
          else
            gh release create "$tag" \
              --target "$GITHUB_SHA" \
              --title "$tag" \
              $flags \
              --generate-notes \
              main.js manifest.json styles.css
          fi
